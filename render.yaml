services:
  # Web Application
  - type: web
    name: itinerary-backend
    env: go
    region: oregon
    plan: free
    buildCommand: "cd itinerary-backend && go mod download && go build -o itinerary-backend ."
    startCommand: "cd itinerary-backend && ./itinerary-backend"
    envVars:
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromService:
          type: postgres
          name: itinerary-db
          envVarKey: PGHOST
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        fromService:
          type: postgres
          name: itinerary-db
          envVarKey: PGUSER
      - key: DB_PASSWORD
        fromService:
          type: postgres
          name: itinerary-db
          envVarKey: PGPASSWORD
      - key: DB_NAME
        fromService:
          type: postgres
          name: itinerary-db
          envVarKey: PGDATABASE
      - key: REDIS_HOST
        value: itinerary-redis
      - key: REDIS_PORT
        value: 6379

  # PostgreSQL Database
  - type: postgres
    name: itinerary-db
    plan: free
    region: oregon
    ipAllowList: []
    postgresMajorVersion: 18

  # Redis Cache
  - type: redis
    name: itinerary-redis
    plan: free
    region: oregon
    ipAllowList: []
