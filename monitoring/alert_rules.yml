# Prometheus Alert Rules for Itinerary Backend

groups:
  - name: itinerary_alerts
    interval: 30s
    
    rules:
      # CRITICAL ALERTS - Page immediately
      
      - alert: ServiceDown
        expr: up{job="itinerary-backend"} == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Itinerary Backend Service is DOWN"
          description: "Service has been unreachable for 2 minutes. Instance: {{ $labels.instance }}"
          dashboard: "https://grafana.example.com/d/itinerary"
          runbook: "https://wiki.example.com/runbooks/service-down"

      - alert: HighErrorRate
        expr: (rate(http_errors_total[5m]) / rate(http_requests_total[5m])) > 0.10
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
          instance: "{{ $labels.instance }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: db_connections_active / db_connections_max > 0.90
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value | humanizePercentage }} of connections in use"
          instance: "{{ $labels.instance }}"

      - alert: OutOfMemory
        expr: process_resident_memory_bytes > 256000000  # 256MB
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage: {{ $value | humanize }}B"
          instance: "{{ $labels.instance }}"

      # WARNING ALERTS - Slack notification

      - alert: ResponseTimeDegradation
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Response time degradation"
          description: "P95 latency: {{ $value | humanizeDuration }}"
          instance: "{{ $labels.instance }}"

      - alert: CacheHitRateLow
        expr: cache_hits_total / (cache_hits_total + cache_misses_total) < 0.80
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Cache hit rate below threshold"
          description: "Current hit rate: {{ $value | humanizePercentage }} (threshold: 80%)"
          instance: "{{ $labels.instance }}"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 70
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage: {{ $value | humanizePercentage }}"
          instance: "{{ $labels.instance }}"

      - alert: DatabaseLatencyHigh
        expr: histogram_quantile(0.95, rate(db_query_duration_ms_bucket[5m])) > 100
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database query latency is high"
          description: "P95 latency: {{ $value }}ms (threshold: 100ms)"
          instance: "{{ $labels.instance }}"

      - alert: GoroutineLeakDetected
        expr: go_goroutines > 200
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Potential goroutine leak detected"
          description: "Current goroutines: {{ $value }} (threshold: 200)"
          instance: "{{ $labels.instance }}"

      - alert: RequestQueueingDetected
        expr: rate(http_requests_total[1m]) < rate(http_requests_total[5m])
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Request rate decreasing - possible queuing"
          description: "Request rate is decreasing. Check for bottlenecks."
          instance: "{{ $labels.instance }}"

      # INFO ALERTS - Just log

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 200000000  # 200MB
        for: 5m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "Memory usage is elevated"
          description: "Memory: {{ $value | humanize }}B"
          instance: "{{ $labels.instance }}"

      - alert: CacheEvictionRateHigh
        expr: rate(cache_evictions_total[5m]) > 100
        for: 5m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "Cache eviction rate is high"
          description: "Eviction rate: {{ $value }}/sec"
          instance: "{{ $labels.instance }}"
