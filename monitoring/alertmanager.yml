# AlertManager Configuration for Alert Routing and Notifications

global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# The root route with all parameters
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-pagerduty'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 15m
      continue: true

    # Warning alerts - Slack notification
    - match:
        severity: warning
      receiver: 'warnings-slack'
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 1h
      continue: true

    # Info alerts - log only
    - match:
        severity: info
      receiver: 'info-logging'
      group_wait: 10m
      group_interval: 1h
      repeat_interval: 24h

# Inhibition rules
inhibit_rules:
  # Inhibit warning alerts if service is down
  - source_match:
      severity: 'critical'
      alertname: 'ServiceDown'
    target_match:
      severity: 'warning'
    equal: ['instance']

  # Inhibit all alerts if database is down
  - source_match:
      severity: 'critical'
      alertname: 'DatabaseConnectionPoolExhausted'
    target_match:
      severity: 'warning'
    equal: ['instance']

# Receivers
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: 'Itinerary Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        send_resolved: true

  - name: 'critical-pagerduty'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .Alerts.Firing | len }} alerts firing'
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL: {{ .Alerts.Firing | len }} alerts'
        text: '{{ range .Alerts.Firing }}{{ .Annotations.summary }} ({{ .Labels.instance }})\n{{ end }}'
        actions:
          - type: button
            text: 'View Grafana'
            url: 'https://grafana.example.com'
          - type: button
            text: 'Runbook'
            url: 'https://wiki.example.com/runbooks'
        send_resolved: true

  - name: 'warnings-slack'
    slack_configs:
      - channel: '#backend-warnings'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          {{ range .Alerts }}
          *Instance:* {{ .Labels.instance }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'

  - name: 'info-logging'
    slack_configs:
      - channel: '#backend-info'
        title: 'ℹ️ INFO: {{ .Alerts.Firing | len }} alerts'
        text: '{{ range .Alerts.Firing }}• {{ .Annotations.summary }}\n{{ end }}'
        send_resolved: false

