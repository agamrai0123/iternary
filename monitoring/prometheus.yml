# Prometheus Configuration for Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'itinerary-backend'
    environment: 'production'
    cluster: 'render'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Itinerary Backend Application
  - job_name: 'itinerary-backend'
    scheme: https
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['itinerary-backend-ikpw.onrender.com']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Health check endpoint
  - job_name: 'itinerary-health'
    scheme: https
    metrics_path: '/api/health'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['itinerary-backend-ikpw.onrender.com']

  # Service monitor for Kubernetes (if using K8s)
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
  #     - role: pod
  #   relabel_configs:
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
  #       action: keep
  #       regex: true

