apiVersion: v1
kind: ConfigMap
metadata:
  name: itinerary-config
  namespace: default
  labels:
    app: itinerary-backend
  annotations:
    description: "Configuration for Itinerary Backend Service"
    version: "1.0"

data:
  # Database Configuration
  database.host: "postgres.default.svc.cluster.local"
  database.port: "5432"
  database.name: "itinerary_production"
  database.max_connections: "25"
  database.ssl_mode: "require"
  database.connection_timeout: "10s"
  database.idle_timeout: "30m"
  
  # Cache Configuration
  cache.host: "redis.default.svc.cluster.local"
  cache.port: "6379"
  cache.ttl: "3600"  # 1 hour
  cache.max_memory: "512mb"
  cache.eviction_policy: "allkeys-lru"
  
  # Application Configuration
  app.mode: "release"  # release, debug, test
  app.log_level: "info"  # info, debug, warn, error
  app.environment: "production"
  app.version: "1.0.0"
  
  # API Configuration
  api.port: "8080"
  api.read_timeout: "30s"
  api.write_timeout: "30s"
  api.max_header_bytes: "1048576"  # 1MB
  
  # Security Configuration
  security.rate_limit_requests: "1000"
  security.rate_limit_window: "60"
  security.cors_allowed_origins: "*"
  security.cors_allowed_methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  security.cors_allowed_headers: "Content-Type,Authorization,X-Requested-With"
  security.cors_max_age: "3600"
  security.hsts_max_age: "31536000"
  security.hsts_include_subdomains: "true"
  security.hsts_preload: "true"
  
  # Performance Configuration
  performance.connection_pool_size: "25"
  performance.query_timeout: "30s"
  performance.max_request_size: "10485760"  # 10MB
  
  # Monitoring Configuration
  monitoring.metrics_enabled: "true"
  monitoring.metrics_port: "9090"
  monitoring.metrics_path: "/metrics"
  monitoring.traces_enabled: "true"
  monitoring.traces_sample_rate: "0.1"
  
  # Health Check Configuration
  health.liveness_path: "/health"
  health.readiness_path: "/ready"
  health.startup_path: "/health"
  health.check_interval: "10s"
  health.check_timeout: "5s"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
  labels:
    app: itinerary-backend
  annotations:
    description: "PostgreSQL database credentials"

type: Opaque
stringData:
  # Base PostgreSQL credentials
  username: "itinerary_user"
  password: "secure_postgres_password_2026"  # MUST change in production!
  
  # Full connection string
  url: "postgresql://itinerary_user:secure_postgres_password_2026@postgres.default.svc.cluster.local:5432/itinerary_production?sslmode=require"
  
  # Connection details
  host: "postgres.default.svc.cluster.local"
  port: "5432"
  database: "itinerary_production"

---
apiVersion: v1
kind: Secret
metadata:
  name: cache-credentials
  namespace: default
  labels:
    app: itinerary-backend
  annotations:
    description: "Redis cache credentials"

type: Opaque
stringData:
  # Redis connection string
  url: "redis://redis.default.svc.cluster.local:6379/0"
  
  # Redis details
  host: "redis.default.svc.cluster.local"
  port: "6379"
  password: ""  # Redis has no password by default in K8s

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
  labels:
    app: itinerary-backend
  annotations:
    description: "Application secrets (JWT, API keys, etc.)"

type: Opaque
stringData:
  # JWT Secret for token signing (MUST be 32+ random characters)
  jwt_secret: "your-super-secret-jwt-key-2026-production-key-min-32-chars"
  
  # Additional API secrets can go here
  # api_key: "secret-api-key"
  # oauth_client_secret: "secret-oauth-client-secret"

---
# ServiceAccount for pod RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: itinerary-backend
  namespace: default
  labels:
    app: itinerary-backend

---
# ClusterRole for pod permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: itinerary-backend
  namespace: default

rules:
# Allow reading ConfigMaps (for dynamic configuration)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
  resourceNames: ["itinerary-config"]

# Allow reading Secrets (for credentials)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["db-credentials", "cache-credentials", "app-secrets"]

# Allow reading pods (for service discovery)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Allow accessing logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

---
# ClusterRoleBinding to attach role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: itinerary-backend
  namespace: default

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: itinerary-backend

subjects:
- kind: ServiceAccount
  name: itinerary-backend
  namespace: default
