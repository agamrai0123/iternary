services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: itinerary_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2026
      POSTGRES_DB: itinerary_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itinerary_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itinerary_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itinerary_network

  # Go Application (optional - for later)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itinerary_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres_secure_2026
      DB_NAME: itinerary_production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GIN_MODE: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./itinerary-backend:/app
    networks:
      - itinerary_network

volumes:
  postgres_data:
  redis_data:

networks:
  itinerary_network:
    driver: bridge
